name: Build Player Pool

on:
  push:
    paths:
      - "scripts/build_player_pool.py"
      - ".github/workflows/build-player-pool.yml"
  schedule:
    - cron: "20,40 8 * * *"
    - cron: "0,10 9 * * *"
    - cron: "20,40 9 * * *"
    - cron: "0,10 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-player-pool
  cancel-in-progress: false

jobs:
  build-player-pool:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Build player pool
        run: python scripts/build_player_pool.py

      - name: Commit players.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add src/data/players.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: refresh player pool"
          git push
