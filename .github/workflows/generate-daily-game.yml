name: Generate Daily Game

on:
  schedule:
    - cron: "10 9 * * *"

  workflow_dispatch:
    inputs:
      date:
        description: "Optional override date in YYYY-MM-DD"
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate-daily-game:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 nba_api

      - name: Resolve build date (NY timezone)
        shell: bash
        run: |
          INPUT_DATE='${{ github.event.inputs.date }}'

          if [ -n "$INPUT_DATE" ]; then
            BUILD_DATE="$INPUT_DATE"
          else
            BUILD_DATE="$(TZ=America/New_York date +%F)"
          fi

          echo "BUILD_DATE=$BUILD_DATE" >> "$GITHUB_ENV"
          echo "Using BUILD_DATE=$BUILD_DATE"

      - name: Build player pool
        id: build_pool
        continue-on-error: true
        shell: bash
        run: |
          echo "Attempting to rebuild src/data/players.json..."
          python scripts/build_player_pool.py

      - name: Report player pool result
        shell: bash
        run: |
          if [ "${{ steps.build_pool.outcome }}" = "success" ]; then
            echo "Fresh players.json built successfully."
          else
            echo "WARNING: build_player_pool.py failed."
            echo "Continuing with existing checked-in src/data/players.json."
            if [ ! -f src/data/players.json ]; then
              echo "ERROR: src/data/players.json does not exist, so there is no fallback."
              exit 1
            fi
          fi

      - name: Build game + solution
        run: npx tsx scripts/buildGame.ts --date "$BUILD_DATE"

      - name: Update current date pointer
        run: npx tsx scripts/setCurrentGameDate.ts --date "$BUILD_DATE"

      - name: Commit generated files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            src/data/players.json \
            src/data/games/game_${BUILD_DATE}.json \
            src/data/solutions/game_${BUILD_DATE}_solution.json \
            src/data/dates/currentDate.ts

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: generate daily game for ${BUILD_DATE}"
          git push
