name: Generate Daily Game

on:
  schedule:
    # 7:30 AM America/New_York during EDT or 8:30AM
    - cron: "30 12 * * *"

  workflow_dispatch:
    inputs:
      date:
        description: "Optional override date in YYYY-MM-DD"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: generate-daily-game
  cancel-in-progress: false

jobs:
  generate-daily-game:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve build date (NY timezone)
        shell: bash
        run: |
          INPUT_DATE='${{ github.event.inputs.date }}'

          if [ -n "$INPUT_DATE" ]; then
            BUILD_DATE="$INPUT_DATE"
          else
            BUILD_DATE="$(TZ=America/New_York date +%F)"
          fi

          echo "BUILD_DATE=$BUILD_DATE" >> "$GITHUB_ENV"
          echo "Using BUILD_DATE=$BUILD_DATE"

      - name: Ensure player pool exists
        shell: bash
        run: |
          if [ ! -f src/data/players.json ]; then
            echo "ERROR: players.json missing."
            exit 1
          fi

      - name: Build game + solution
        run: npx tsx scripts/buildGame.ts --date "$BUILD_DATE"

      - name: Update current date pointer
        run: npx tsx scripts/setCurrentGameDate.ts --date "$BUILD_DATE"

      - name: Commit generated files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            "src/data/games/game_${BUILD_DATE}.json" \
            "src/data/solutions/game_${BUILD_DATE}_solution.json" \
            "src/data/dates/currentDate.ts"

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: generate daily game for ${BUILD_DATE}"
          git push
